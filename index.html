    <title>Unity Rise</title>
    <script>
      const favicon = document.getElementById('favicon');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

      function updateFavicon(isDark) {
        favicon.href = isDark ? '/ur_logo.png' : '/ur_logo_black.png';
      }

      // Set initial favicon
      updateFavicon(prefersDark.matches);

      // Listen for changes
      prefersDark.addEventListener('change', (e) => updateFavicon(e.matches));
    </script>
